# 기본
http_address = "0.0.0.0:4180"

# Keycloak
provider = "keycloak-oidc"

# 쿠키
cookie_secret = "0123456789abcdef0123456789abcdef"
cookie_secure = false

# 도메인 / 이메일 허용
email_domains = ["*"]
skip_provider_button = true

# Proxy 관련
reverse_proxy = true
set_authorization_header = true
pass_access_token = true

# Upstream
upstreams = ["static://200"] # 인증만 수행하고 프록시는 하지 않음

# OIDC 동작
oidc_issuer_url = "http://keycloak:8080/auth/realms/dev" # 신뢰할 인증 서버 URL

insecure_oidc_skip_issuer_verification = true # OIDC 발급자 검증 무시

skip_oidc_discovery = true # OIDC discovery 자동 조회 생략

redeem_url = "http://keycloak:8080/auth/realms/dev/protocol/openid-connect/token" # 토큰 교환 URL
oidc_jwks_url = "http://keycloak:8080/auth/realms/dev/protocol/openid-connect/certs" # JWKS URL
login_url = "${PUBLIC_BASE_DOMAIN}:${PUBLIC_BASE_PORT}/auth/realms/dev/protocol/openid-connect/auth" # 로그인 시작 URL
redirect_url = "${PUBLIC_BASE_DOMAIN}:${PUBLIC_BASE_PORT}/oauth2/callback" # 인증 후 돌아갈 URL
