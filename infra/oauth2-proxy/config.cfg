# 기본
http_address = "0.0.0.0:4180"
redirect_url = "http://localhost:4000/oauth2/callback"

# Keycloak
provider = "keycloak-oidc"
oidc_issuer_url = "http://host.docker.internal:4000/auth/realms/dev"
client_id = "ghibli-client"
client_secret = "ghibli-secret"

# 쿠키
cookie_secret = "0123456789abcdef0123456789abcdef"
cookie_secure = false

# 도메인 / 이메일 허용
email_domains = ["*"]
skip_provider_button = true

# Proxy 관련
reverse_proxy = true
set_authorization_header = true
pass_access_token = true

# Upstream
upstreams = ["static://200"] # 인증만 수행하고 프록시는 하지 않음
