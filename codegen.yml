overwrite: true
generates:
  src/graphql/authenticated/api/type.ts:
    schema: ../server/graphql/authenticatedSchema.graphql
    documents: src/graphql/authenticated/**/*.graphql
    plugins:
      - typescript

  src/graphql/authenticated/api/operations.ts:
    schema: ../server/graphql/authenticatedSchema.graphql
    documents: src/graphql/authenticated/**/*.graphql
    plugins:
      - typescript-operations
    preset: import-types
    presetConfig:
      typesPath: ./type
      importTypesNamespace: Types

  src/graphql/authenticated/api/hooks.ts:
    schema: ../server/graphql/authenticatedSchema.graphql
    documents: src/graphql/authenticated/**/*.graphql
    plugins:
      - typescript-react-apollo
    preset: import-types
    presetConfig:
      typesPath: ./operations
      importTypesNamespace: Ops

  src/graphql/anonymous/api/type.ts:
    schema: ../server/graphql/anonymousSchema.graphql
    documents: src/graphql/anonymous/**/*.graphql
    plugins:
      - typescript

  src/graphql/anonymous/api/operations.ts:
    schema: ../server/graphql/anonymousSchema.graphql
    documents: src/graphql/anonymous/**/*.graphql
    plugins:
      - typescript-operations
    preset: import-types
    presetConfig:
      typesPath: ./type
      importTypesNamespace: Types

  src/graphql/anonymous/api/hooks.ts:
    schema: ../server/graphql/anonymousSchema.graphql
    documents: src/graphql/anonymous/**/*.graphql
    plugins:
      - typescript-react-apollo
    preset: import-types
    presetConfig:
      typesPath: ./operations
      importTypesNamespace: Ops
