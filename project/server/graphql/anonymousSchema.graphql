"""
명장면
"""
type Cut {
    """
    감상평
    """
    cutReviews: CutReview!

    """
    좋아요
    """
    cutVotes: Film!

    """
    영화
    """
    film: Film!

    """
    영화 아이디
    """
    filmId: Int!

    """
    명장면 고유 아이디
    """
    id: Int!

    """
    좋아요 확인
    """
    isVoted: Boolean!

    """
    명장면 사진 주소
    """
    src: String!

    """
    좋아요 수
    """
    votesCount: Int!
}

"""
감상평
"""
type CutReview {
    """
    감상평 내용
    """
    contents: String!

    """
    생성 일자
    """
    createdAt: String!

    """
    명장면
    """
    cut: Cut!

    """
    명장면 번호
    """
    cutId: Int!

    """
    감상평 고유 아이디
    """
    id: Int!

    """
    유저가 작성한 리뷰인지 여부
    """
    isMine: Boolean!

    """
    수정 일자
    """
    updatedAt: String!

    """
    유저
    """
    user: User!
}

"""
좋아요
"""
type CutVote {
    """
    명장면
    """
    cut: Cut!

    """
    유저
    """
    user: User!
}

"""
감독
"""
type Director {
    """
    감독 고유 아이디
    """
    id: Int!

    """
    감독 이름
    """
    name: String!
}

"""
영화
"""
type Film {
    """
    영화 줄거리 및 설명
    """
    description: String!

    """
    제작자
    """
    director: Director!

    """
    영화 장르
    """
    genre: String!

    """
    영화 고유 아이디
    """
    id: Int!

    """
    포스터 이미지 URL
    """
    posterImg: String!

    """
    개봉일
    """
    releaseDate: String!

    """
    영화 러닝 타임, minute
    """
    runningTime: Float!

    """
    영화 부제목
    """
    subtitle: String

    """
    영화 제목
    """
    title: String!
}

"""
알림
"""
type Notification {
    """
    작성 날짜
    """
    createdAt: String!

    """
    알림 고유 아이디
    """
    id: Int!

    """
    알림 메시지
    """
    text: String!

    """
    수정 날짜
    """
    updatedAt: String!

    """
    유저
    """
    user: User!
}

"""
페이지네이션
"""
type PaginatedFilms {
    """
    커서
    """
    cursor: Int

    """
    영화 리스트
    """
    films: [Film!]!
}

type Query {
    """
    특정 장면을 조회합니다.
    """
    cut(cutId: Int!): Cut

    """
    장면의 감상평을 조회합니다.
    """
    cutReviews(cutId: Int!, skip: Int, take: Int! = 2): [CutReview!]!

    """
    장면 목록을 조회합니다.
    """
    cuts(filmId: Int!): [Cut!]!

    """
    특정 영화를 상세히 조회합니다.
    """
    film(filmId: Int!): Film

    """
    영화 목록을 페이지네이션하여 조회합니다.
    """
    films(cursor: Int = 1, limit: Int = 6, search: String): PaginatedFilms!
}

"""
유저
"""
type User {
    """
    생성일자
    """
    createdAt: String!

    """
    감상평
    """
    cutReviews: [CutReview!]!

    """
    좋아요
    """
    cutVotes: [CutVote!]!

    """
    유저 이메일
    """
    email: String!

    """
    식별자
    """
    id: Int!

    """
    관리자
    """
    isAdmin: Boolean!

    """
    알림
    """
    notifications: [Notification!]!

    """
    유저 프로필 사진 경로
    """
    profileImage: String

    """
    수정일자
    """
    updatedAt: String!

    """
    유저 이름
    """
    username: String!
}
